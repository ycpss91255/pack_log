services:
  # --- Unit test + ShellCheck + Coverage ---
  ci:
    image: kcov/kcov
    security_opt:
      - seccomp=unconfined
    volumes:
      - .:/source
    working_dir: /source
    environment:
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        apt-get update && \
        apt-get install -y --no-install-recommends \
            bats \
            bats-support \
            bats-assert \
            bats-file \
            shellcheck \
            openssh-client

        echo "--- Running ShellCheck ---"
        shellcheck -x -S error pack_log.sh

        echo "--- Running Tests & Coverage ---"
        kcov --include-path=./pack_log.sh \
            --exclude-region=KCOV_EXCL_START:KCOV_EXCL_STOP \
            --exclude-line=KCOV_EXCL_LINE \
            ./coverage \
            bats test/

        if [ -n "${HOST_UID}" ] && [ -n "${HOST_GID}" ]; then
            echo "--- Fixing permissions for coverage directory ---"
            chown -R "${HOST_UID}:${HOST_GID}" coverage/
            echo "Coverage report generated at: $(pwd)/coverage/index.html"
        fi

  # --- Remote integration test (SSH to sshd container) ---
  sshd:
    build:
      context: .
      dockerfile: test/Dockerfile.sshd
    hostname: test-sshd

  integration:
    image: kcov/kcov
    security_opt:
      - seccomp=unconfined
    depends_on:
      - sshd
    volumes:
      - .:/source
    working_dir: /source
    environment:
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
      - INTEGRATION_SSH_HOST=testuser@sshd
      - INTEGRATION_SSH_KEY=/root/.ssh/integration_key
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e

        # ---- Install dependencies ----
        apt-get update && apt-get install -y --no-install-recommends \
            bats \
            bats-support \
            bats-assert \
            bats-file \
            openssh-client \
            rsync \
            sshpass

        # ---- Generate SSH key pair ----
        mkdir -p /root/.ssh
        ssh-keygen -t ed25519 -f /root/.ssh/integration_key -N "" -q

        # ---- Wait for sshd to be ready ----
        echo "Waiting for sshd..."
        for i in $$(seq 1 30); do
          if sshpass -p testpass ssh \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=2 \
              testuser@sshd true 2>/dev/null; then
            echo "sshd is ready."
            break
          fi
          sleep 1
        done

        # ---- Copy SSH key to sshd ----
        sshpass -p testpass ssh-copy-id \
            -i /root/.ssh/integration_key \
            -o StrictHostKeyChecking=no \
            testuser@sshd 2>/dev/null

        # Verify key-based auth works
        ssh -i /root/.ssh/integration_key \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=no \
            testuser@sshd echo "SSH key auth OK"

        # ---- Create test log files on remote ----
        ssh -i /root/.ssh/integration_key \
            -o StrictHostKeyChecking=no \
            testuser@sshd bash -s < test/setup_remote_logs.sh

        # ---- Run integration tests ----
        echo "--- Running Remote Integration Tests ---"
        bats test/integration/

        echo "--- Remote Integration Tests Complete ---"
