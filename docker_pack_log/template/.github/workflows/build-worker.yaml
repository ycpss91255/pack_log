name: Docker Build & Smoke Test

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
        description: "Container image name (e.g. ros_noetic)"
      build_args:
        required: false
        type: string
        default: ""
        description: "Multi-line KEY=VALUE build args"
      build_runtime:
        required: false
        type: boolean
        default: true
        description: "Whether to build runtime stage"

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check template version
        run: |
          if [ -f .template_version ]; then
            LOCAL_VER=$(cat .template_version)
            LATEST_VER=$(git ls-remote --tags --sort=-v:refname \
              https://github.com/ycpss91255-docker/template.git \
              | grep -oP 'refs/tags/v\d+\.\d+\.\d+$' | head -1 | sed 's|refs/tags/||')
            if [ -n "${LATEST_VER}" ] && [ "${LOCAL_VER}" != "${LATEST_VER}" ]; then
              echo "::warning::template ${LOCAL_VER} → ${LATEST_VER} available"
            else
              echo "template is up to date (${LOCAL_VER})"
            fi
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate .env
        run: |
          cat > .env << EOF
          USER_NAME=ci
          USER_GROUP=ci
          USER_UID=1000
          USER_GID=1000
          HARDWARE=x86_64
          DOCKER_HUB_USER=ci
          GPU_ENABLED=false
          IMAGE_NAME=${{ inputs.image_name }}
          WS_PATH=/tmp/workspace
          EOF
          mkdir -p /tmp/workspace

      - name: Build test stage (includes smoke tests)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: test
          push: false
          build-args: |
            USER=ci
            GROUP=ci
            UID=1000
            GID=1000
            HARDWARE=x86_64
            ${{ inputs.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build devel stage
        uses: docker/build-push-action@v6
        with:
          context: .
          target: devel
          push: false
          build-args: |
            USER=ci
            GROUP=ci
            UID=1000
            GID=1000
            HARDWARE=x86_64
            ${{ inputs.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build runtime stage
        if: ${{ inputs.build_runtime }}
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: false
          build-args: |
            USER=ci
            GROUP=ci
            UID=1000
            GID=1000
            ${{ inputs.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
