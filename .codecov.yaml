# kcov cannot track individual elements inside bash array literals
# (e.g. every entry of `long_opts_arr=( "number:" ... )` is reported as
# lineNoCov even though it is exercised on every invocation). A 5% patch
# buffer accommodates that tooling gap without masking real regressions;
# project coverage stays strict via auto target + 0.5% threshold.
coverage:
  status:
    project:
      default:
        target: auto
        threshold: 0.5%
    patch:
      default:
        target: 95%
        threshold: 2%

ignore:
  - "test/**/*"
  - "bash_test_helper/**/*"
  - ".github/**/*"

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false
  require_base: yes
  require_head: yes
