coverage:
  status:
    project:
      default:
        target: auto       # must not drop below previous coverage
        threshold: 0%      # zero tolerance for decrease
        if_ci_failed: error
    patch:
      default:
        target: 100%       # new code must be fully covered
        threshold: 0%
        if_ci_failed: error

ignore:
  - "test/**/*"
  - ".github/**/*"

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false
  require_base: yes
  require_head: yes
