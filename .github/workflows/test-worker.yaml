name: Reusable Test Worker

on:
  workflow_call:
  workflow_dispatch:

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-ci-${{ hashFiles('test/Dockerfile.ci') }}
          restore-keys: ${{ runner.os }}-docker-ci-

      - name: Pre-build CI image
        run: |
          docker buildx build \
            --file test/Dockerfile.ci \
            --tag pack-log-ci:local \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --load \
            .
          # Rotate cache to avoid unbounded growth
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Run CI (Lint & Test) via Docker
        run: |
          chmod +x ci.sh
          ./ci.sh unit

      - name: Show Coverage Summary in Log
        run: |
          python3 -c "
          import json, glob
          try:
              files = glob.glob('coverage/*/coverage.json')
              if not files:
                  print('Coverage data not found.')
                  exit(0)
              with open(files[0]) as f:
                  data = json.load(f)
              print('\n' + '='*60)
              print(f'{\"File Name\":<45} {\"Coverage\":>10}')
              print('-'*60)
              for f in data.get('files', []):
                  if '/usr/' not in f['file']:
                      name = f['file'].split('/')[-1]
                      print(f'{name:<45} {f[\"percent_covered\"]:>9}%')
              print('='*60 + '\n')
          except Exception as e:
              print(f'Error: {e}')
          "

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/

      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/*/cov.xml
          fail_ci_if_error: false

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers (CI + sshd)
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-int-${{ hashFiles('test/Dockerfile.ci', 'test/Dockerfile.sshd') }}
          restore-keys: ${{ runner.os }}-docker-int-

      - name: Pre-build CI and sshd images
        run: |
          for df in test/Dockerfile.ci test/Dockerfile.sshd; do
            tag="pack-log-$(basename "${df}" .Dockerfile | sed 's/Dockerfile\.//')"
            docker buildx build \
              --file "${df}" \
              --tag "${tag}:local" \
              --cache-from type=local,src=/tmp/.buildx-cache \
              --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
              --load \
              .
          done
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Run Integration Tests via Docker
        run: |
          chmod +x ci.sh
          ./ci.sh integration
